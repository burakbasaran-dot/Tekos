<style>
    .mail-sending-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 28px;
    }
    .mail-sending-overlay.active {
        display: flex;
    }
    .mail-sending-text {
        color: #f8fafc;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-align: center;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }
    .mail-sending-subtext {
        color: #cbd5e1;
        font-size: 14px;
        margin-top: -16px;
        text-align: center;
        max-width: 320px;
        line-height: 1.45;
    }
    .hourglass-scene {
        perspective: 900px;
        width: 160px;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .hourglass-3d {
        position: relative;
        width: 110px;
        height: 170px;
        transform-style: preserve-3d;
        animation: mail-hourglass-float 2.4s ease-in-out infinite;
    }
    .hourglass-frame {
        position: absolute;
        inset: 0;
        border: 4px solid #fbbf24;
        border-radius: 12px;
        background: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
        box-shadow:
            0 18px 40px rgba(0, 0, 0, 0.35),
            inset 0 0 24px rgba(255, 255, 255, 0.12),
            0 0 0 2px rgba(251, 191, 36, 0.35);
        clip-path: polygon(8% 0%, 92% 0%, 68% 46%, 68% 54%, 92% 100%, 8% 100%, 32% 54%, 32% 46%);
    }
    .hourglass-glass-top,
    .hourglass-glass-bottom {
        position: absolute;
        left: 50%;
        width: 72px;
        height: 72px;
        transform: translateX(-50%);
        border-radius: 50%;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.2);
    }
    .hourglass-glass-top { top: 18px; }
    .hourglass-glass-bottom { bottom: 18px; }
    .sand-top {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 78%;
        background: linear-gradient(180deg, #fcd34d 0%, #f59e0b 100%);
        animation: mail-sand-top-drain 2.2s ease-in infinite;
        transform-origin: bottom center;
    }
    .sand-bottom {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 0%;
        background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
        animation: mail-sand-bottom-fill 2.2s ease-in infinite;
    }
    .sand-stream {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 34px;
        margin-left: -3px;
        margin-top: -17px;
        background: linear-gradient(180deg, #fbbf24, #f59e0b);
        border-radius: 999px;
        animation: mail-sand-stream-pulse 0.55s ease-in-out infinite alternate;
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.65);
    }
    .hourglass-shine {
        position: absolute;
        top: 12px;
        left: 18px;
        width: 18px;
        height: 120px;
        background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0));
        border-radius: 20px;
        filter: blur(1px);
        transform: rotate(8deg);
        pointer-events: none;
    }
    @keyframes mail-hourglass-float {
        0%, 100% { transform: rotateX(8deg) rotateY(-12deg) translateY(0); }
        50% { transform: rotateX(12deg) rotateY(10deg) translateY(-8px); }
    }
    @keyframes mail-sand-top-drain {
        0% { height: 78%; opacity: 1; }
        90% { height: 8%; opacity: 0.9; }
        100% { height: 78%; opacity: 1; }
    }
    @keyframes mail-sand-bottom-fill {
        0% { height: 0%; }
        90% { height: 78%; }
        100% { height: 0%; }
    }
    @keyframes mail-sand-stream-pulse {
        from { opacity: 0.55; transform: scaleY(0.85); }
        to { opacity: 1; transform: scaleY(1.08); }
    }
</style>

<div id="mailSendingOverlay" class="mail-sending-overlay" aria-live="polite" aria-busy="true">
    <div class="hourglass-scene">
        <div class="hourglass-3d">
            <div class="hourglass-frame"></div>
            <div class="hourglass-glass-top"><div class="sand-top"></div></div>
            <div class="hourglass-glass-bottom"><div class="sand-bottom"></div></div>
            <div class="sand-stream"></div>
            <div class="hourglass-shine"></div>
        </div>
    </div>
    <div>
        <div class="mail-sending-text">Mail gönderiliyor…</div>
        <div class="mail-sending-subtext" id="mailSendingSubtext">
            {{ mail_sending_subtext|default:"Lütfen bekleyin, işlem tamamlanıyor." }}
        </div>
    </div>
</div>

<script>
(function() {
    if (window.__mailSendingOverlayInit) return;
    window.__mailSendingOverlayInit = true;

    document.addEventListener('DOMContentLoaded', function() {
        const overlay = document.getElementById('mailSendingOverlay');
        const subtextEl = document.getElementById('mailSendingSubtext');
        if (!overlay) return;

        function showMailSendingOverlay(form) {
            const customSubtext = form.getAttribute('data-mail-sending-subtext');
            if (subtextEl && customSubtext) {
                subtextEl.textContent = customSubtext;
            }
            overlay.classList.add('active');

            form.querySelectorAll('button[type="submit"], input[type="submit"]').forEach(function(btn) {
                if (!btn.disabled) {
                    btn.disabled = true;
                    if (btn.tagName === 'BUTTON' && !btn.dataset.mailSendingOriginalText) {
                        btn.dataset.mailSendingOriginalText = btn.textContent;
                        btn.textContent = 'Gönderiliyor…';
                    }
                }
            });

            form.querySelectorAll('.js-mail-sending-disable').forEach(function(el) {
                el.style.pointerEvents = 'none';
                el.style.opacity = '0.5';
            });
        }

        document.querySelectorAll('form.js-mail-sending-form').forEach(function(form) {
            form.addEventListener('submit', function() {
                showMailSendingOverlay(form);
            });
        });
    });
})();
</script>
