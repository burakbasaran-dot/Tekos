{% extends "stokapp/base.html" %}
{% block title %}CNC ekipmanı sil{% endblock %}
{% block content %}
<div class="card" style="max-width: 520px; margin: 0 auto;">
  <h2 style="margin-top:0;">Kaydı sil</h2>
  <p style="color:#64748b;line-height:1.6;">«<strong>{{ ekipman.ad }}</strong>» kalıcı olarak silinecek. Bu işlem geri alınamaz.</p>
  <form method="post" style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;">
    {% csrf_token %}
    <button type="submit" class="btn" style="background:#dc2626;color:#fff;padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Evet, sil</button>
    <a href="{% url 'stokapp:cnc_ekipman_listesi' %}" class="btn btn-secondary" style="padding:10px 18px;border-radius:8px;">İptal</a>
  </form>
</div>
{% endblock %}
