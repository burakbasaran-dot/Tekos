{% extends "stokapp/base.html" %}
{% block title %}Erişim reddedildi{% endblock %}
{% block content %}
<div class="card" style="max-width:560px;margin:40px auto;padding:28px;text-align:center;">
  <h1 style="margin:0 0 12px;font-size:22px;color:#991b1b;">403 — Yetki yok</h1>
  <p style="color:#64748b;line-height:1.5;">Bu işlem için gerekli izin hesabınızda tanımlı değil.</p>
  {% if gerekli_yetki %}
  <p style="font-family:monospace;background:#f1f5f9;padding:10px;border-radius:8px;"><strong>{{ gerekli_yetki }}</strong></p>
  {% endif %}
  <a href="{% url 'stokapp:dashboard' %}" class="btn btn-primary" style="margin-top:16px;">Panele dön</a>
</div>
{% endblock %}
